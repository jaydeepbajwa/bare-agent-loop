<svg xmlns="http://www.w3.org/2000/svg" width="960" height="594" viewBox="0 0 960 594" role="img" aria-labelledby="title desc">
  <title id="title">bare-agent --demo output</title>
  <desc id="desc">Terminal output of the deterministic demo: the agent runs the failing test suite, reads two files, and explains the bug.</desc>
  <rect width="960" height="594" rx="10" fill="#111827"/>
  <rect x="0" y="0" width="960" height="42" rx="10" fill="#1f2937"/>
  <circle cx="24" cy="21" r="7" fill="#f87171"/>
  <circle cx="48" cy="21" r="7" fill="#fbbf24"/>
  <circle cx="72" cy="21" r="7" fill="#34d399"/>
  <text x="96" y="27" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="13">python3 -m bare_agent --demo</text>
  <text x="24" y="66" fill="#34d399" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">goal: Triage the failing tests in examples/buggy_math and explain the likely fix.</text>
  <text x="24" y="87" fill="#34d399" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">repo: .</text>
  <text x="24" y="108" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">[1] tool run_command: exit=1</text>
  <text x="24" y="129" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    stderr:</text>
  <text x="24" y="150" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    .F</text>
  <text x="24" y="171" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    ======================================================================</text>
  <text x="24" y="192" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    FAIL: test_average_uses_all_values (test_calculator.AverageTests.test_average_uses_all_values)</text>
  <text x="24" y="213" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    ----------------------------------------------------------------------</text>
  <text x="24" y="234" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    Traceback (most recent call last):</text>
  <text x="24" y="255" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">      File "./examples/buggy_math/test_calculator.py", line 8, in test_average_uses_all_values</text>
  <text x="24" y="276" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">        self.assertEqual(average([2, 4, 6]), 4)</text>
  <text x="24" y="297" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    AssertionError: 6.0 != 4</text>
  <text x="24" y="339" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    ----------------------------------------------------------------------</text>
  <text x="24" y="360" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    Ran 2 tests in 0.000s</text>
  <text x="24" y="402" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    FAILED (failures=1)</text>
  <text x="24" y="423" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">[2] tool read_file: examples/buggy_math/calculator.py lines 1-5</text>
  <text x="24" y="444" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">[3] tool read_file: examples/buggy_math/test_calculator.py lines 1-17</text>
  <text x="24" y="465" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">[4] final: The failing test is caused by average() dividing by len(values) - 1. For [2, 4, 6], that</text>
  <text x="24" y="486" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">returns 6.0 instead of the expected 4.0. The fix is to divide by len(values) while keeping the</text>
  <text x="24" y="507" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">empty-list guard.</text>
  <text x="24" y="528" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    - Change examples/buggy_math/calculator.py to divide by len(values).</text>
  <text x="24" y="549" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">    - Rerun python -m unittest discover -s examples/buggy_math -p 'test_*.py'.</text>
</svg>
